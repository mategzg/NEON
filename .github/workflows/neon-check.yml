name: Neon check

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  db-check:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - name: Skip when DATABASE_URL is not configured
        if: ${{ env.DATABASE_URL == '' }}
        run: echo "DATABASE_URL secret is not configured; skipping Neon check."

      - name: Checkout
        if: ${{ env.DATABASE_URL != '' }}
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: ${{ env.DATABASE_URL != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: ${{ env.DATABASE_URL != '' }}
        run: npm install

      - name: Check Neon connection
        if: ${{ env.DATABASE_URL != '' }}
        run: npm run db:check

      - name: Build app
        if: ${{ env.DATABASE_URL != '' }}
        run: npm run build
