name: Neon check

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  db-check:
    runs-on: ubuntu-latest
    if: ${{ secrets.DATABASE_URL != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Check Neon connection
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run db:check

      - name: Build app
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run build
